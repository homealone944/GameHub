<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Template | GameHub</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../../styles/global.css">
  <style>
    /* Specific tweaks for this game template */
    .game-canvas {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      border: 2px dashed rgba(255,255,255,0.1);
      color: var(--text-secondary);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <div class="game-viewport">
    
    <!-- Top Bar -->
    <header class="game-header">
      <div class="nav-left">
        <a href="../../index.html" class="logo-text text-gradient" style="text-decoration:none;">
          <span class="logo-full">GameHub</span>
          <span class="logo-short">GH</span>
        </a>
      </div>
      <div class="nav-center">
        <h2 class="nav-game-title">Template</h2>
      </div>
      <div class="nav-right">
        <!-- Optional extra top-right actions -->
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="game-body">
      
      <!-- Premium Status Bar (Targeted by individual game JS) -->
      <div id="game-status-bar" class="status-bar-premium">
        <div class="status-item" style="display: flex; flex-direction: column; align-items: center;">
          <div class="status-label">GAME STATUS</div>
          <div id="turn-indicator" class="status-value text-gradient">WAITING...</div>
        </div>
      </div>

      <!-- Main Game Canvas -->
      <div class="game-canvas">
        Game Content Goes Here
      </div>

    </main>

    <!-- Bottom Controls Area -->
    <footer id="footer-trigger" class="game-footer">
      <div class="sheet-handle"></div>
    </footer>

    <!-- Overlay to close sheet when clicking outside -->
    <div id="sheet-overlay" class="hidden" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.3); z-index:115;"></div>

    <!-- Interactive Bottom Sheet -->
    <div id="control-sheet" class="bottom-sheet">
      <div class="sheet-header" id="sheet-header-close" style="cursor: pointer;">
        <div class="sheet-handle"></div>
      </div>
      
      <div class="sheet-content">
        <button class="sheet-btn" onclick="openModal('rules')">
          <span>📖</span>
          <span>Rules</span>
        </button>
        <button class="sheet-btn" onclick="openModal('settings')">
          <span>⚙️</span>
          <span>Settings</span>
        </button>
        <button class="sheet-btn">
          <span>👤</span>
          <span>Profile</span>
        </button>
        <button class="sheet-btn" style="color: var(--accent-coral);">
          <span>🔄</span>
          <span>Restart</span>
        </button>
      </div>
    </div>

  </div>

  <!-- Standard Modals (Placeholder) -->
  <div id="modal-overlay" class="modal hidden">
    <div class="modal-content">
      <h2 id="modal-title">Modal Title</h2>
      <button class="btn-close" onclick="closeModal()">&times;</button>
      <div id="modal-body" class="mt-1" style="color: var(--text-secondary);">
        Content will go here...
      </div>
      <button class="btn btn-primary mt-2 w-100" onclick="closeModal()">Close</button>
    </div>
  </div>

  <script src="../../js/notify.js"></script>
  <script src="../../js/lobby-shell.js" type="module"></script>
  <script>
    // Local UI Logic
    const sheet = document.getElementById('control-sheet');
    const footerTrigger = document.getElementById('footer-trigger');
    const overlay = document.getElementById('sheet-overlay');
    const sheetHeader = document.getElementById('sheet-header-close');
    const modal = document.getElementById('modal-overlay');

    function toggleSheet() {
      const isActive = sheet.classList.toggle('active');
      overlay.classList.toggle('hidden', !isActive);
    }

    footerTrigger.addEventListener('click', toggleSheet);
    overlay.addEventListener('click', toggleSheet);
    sheetHeader.addEventListener('click', toggleSheet);

    function openModal(type) {
      document.getElementById('modal-title').innerText = type.toUpperCase();
      modal.classList.remove('hidden');
      toggleSheet(); // Close sheet when opening modal
    }

    function closeModal() {
      modal.classList.add('hidden');
    }
  </script>
</body>
</html>
